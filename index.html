<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAY - SMAN 1 TANJUNG PALAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-purple: #A78BFA;
            --soft-blue: #7DD3FC;
            --text-dark: #1E293B;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #22C55E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #F0F9FF 0%, #FAF5FF 100%); background-attachment: fixed; min-height: 100vh; display: flex; }

        /* --- LOGIN --- */
        #login-screen { position: fixed; inset: 0; z-index: 100; background: linear-gradient(45deg, var(--soft-blue), var(--soft-purple)); display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
        .login-logo { width: 100px; height: 100px; margin-bottom: 15px; object-fit: contain; }

        /* --- SIDEBAR --- */
        aside { width: 280px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.3); display: flex; flex-direction: column; padding: 30px 20px; position: fixed; height: 100vh; }
        .brand-section { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .brand-logo { width: 55px; height: 55px; object-fit: contain; }
        .brand-text h1 { font-size: 15px; font-weight: 800; color: var(--text-dark); line-height: 1.2; }

        .nav-item { padding: 12px 18px; border-radius: 12px; color: var(--text-dark); font-weight: 600; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: linear-gradient(to right, var(--soft-purple), var(--soft-blue)); color: white; }

        /* --- MAIN --- */
        main { flex: 1; padding: 40px; margin-left: 280px; }
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid white; margin-bottom: 25px; }

        #stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 18px; text-align: center; border-bottom: 4px solid transparent; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 10px 15px; font-size: 11px; color: #64748b; text-transform: uppercase; }
        td { padding: 15px; background: rgba(255, 255, 255, 0.9); border: none; }

        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; color: white; background: linear-gradient(135deg, var(--soft-purple), var(--soft-blue)); }
        .btn-outline { background: white; color: var(--soft-purple); border: 2px solid var(--soft-purple); padding: 10px 20px; }
        .btn-danger { background: #fee2e2; color: #ef4444; padding: 8px 12px; font-size: 11px; border-radius: 8px; }
        
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; width: 100%; background: white; }
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: white; }
        .bg-green { background-color: var(--success); }
        .bg-yellow { background-color: var(--warning); }
        .bg-red { background-color: var(--danger); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <img src="131918.jpg" class="login-logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Logo_Kabupaten_Bulungan.png/482px-Logo_Kabupaten_Bulungan.png'">
        <h2 style="color: var(--text-dark); font-weight: 800;">STAY EWS</h2>
        <p style="opacity: 0.6; font-size: 13px; margin-bottom: 25px;">SMAN 1 TANJUNG PALAS</p>
        <input type="text" id="user" placeholder="guru / sekretaris" style="margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="margin-bottom:20px;">
        <button class="btn" style="width: 100%;" onclick="doLogin()">Masuk</button>
    </div>
</div>

<div id="main-app" style="display:none; width:100%;">
    <aside>
        <div class="brand-section">
            <img src="131918.jpg" class="brand-logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Logo_Kabupaten_Bulungan.png/482px-Logo_Kabupaten_Bulungan.png'">
            <div class="brand-text"><h1>SMAN 1<br>TANJUNG PALAS</h1></div>
        </div>
        <nav>
            <div class="nav-item active" id="nav-absen" onclick="changeTab('absen')">Data Utama</div>
            <div class="nav-item" id="nav-admin" onclick="changeTab('admin')">Master Murid</div>
        </nav>
        <button class="btn" style="margin-top: auto; background: none; color: #64748b;" onclick="location.reload()">Keluar</button>
    </aside>

    <main>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 id="role-title" style="font-weight: 800;">Dashboard</h2>
            <div style="width:240px;"><select id="pilih-kelas" onchange="renderSiswa()"></select></div>
        </div>

        <div id="stats-container" style="display: none;">
            <div class="stat-box" style="border-color: var(--success);"><p style="font-size:11px;">HIJAU</p><h3 id="count-hijau" style="color: var(--success);">0</h3></div>
            <div class="stat-box" style="border-color: var(--warning);"><p style="font-size:11px;">KUNING</p><h3 id="count-kuning" style="color: var(--warning);">0</h3></div>
            <div class="stat-box" style="border-color: var(--danger);"><p style="font-size:11px;">MERAH</p><h3 id="count-merah" style="color: var(--danger);">0</h3></div>
        </div>

        <div id="tab-absen" class="card">
            <table>
                <thead><tr><th>Nama Siswa</th><th id="column-header" style="width:220px;">Opsi</th><th id="th-poin" style="width:140px;">Poin EWS</th></tr></thead>
                <tbody id="body-murid"></tbody>
            </table>
            <div style="text-align:right; margin-top:20px;"><button class="btn" onclick="syncCloud()">Simpan Laporan</button></div>
        </div>

        <div id="tab-admin" style="display:none;">
            <div class="card">
                <h3>Kelola Kelas</h3>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="new-class-name" placeholder="Contoh: XI B, XII A...">
                    <button class="btn" onclick="addNewClass()">Tambah Kelas</button>
                </div>
            </div>
            <div class="card">
                <h3>Database Murid (Klik Hapus jika Pindah)</h3>
                <table style="margin-top:10px;">
                    <thead><tr><th>Nama</th><th>Poin</th><th>Aksi</th></tr></thead>
                    <tbody id="body-master-murid"></tbody>
                </table>
            </div>
            <div class="card">
                <h3>Tambah Murid ke Kelas Terpilih</h3>
                <textarea id="bulk-students" rows="4" placeholder="Satu nama per baris..."></textarea>
                <button class="btn" style="width:100%; margin-top:10px;" onclick="addBulkStudents()">Simpan Murid</button>
            </div>
        </div>
    </main>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('stay_v12_db')) || { "XI A": [] };
    let currentUserRole = "";

    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if((u === "guru" && p === "456") || (u === "sekretaris" && p === "123")) {
            currentUserRole = u;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            if(u === "sekretaris") {
                document.getElementById('nav-admin').style.display = 'none';
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('th-poin').style.display = 'none';
                document.getElementById('column-header').innerText = "Presensi";
            } else {
                document.getElementById('stats-container').style.display = 'grid';
                document.getElementById('th-poin').style.display = 'table-cell';
                document.getElementById('column-header').innerText = "Input Pelanggaran";
            }
            updateDropdown(); renderSiswa();
        } else { alert("User/Pass Salah!"); }
    }

    function addNewClass() {
        const name = document.getElementById('new-class-name').value.toUpperCase().trim();
        if(name && !db[name]) {
            db[name] = [];
            document.getElementById('new-class-name').value = "";
            updateDropdown();
            alert("Kelas " + name + " Berhasil Dibuat!");
        } else { alert("Nama kelas kosong atau sudah ada."); }
    }

    function updateDropdown() {
        const sel = document.getElementById('pilih-kelas');
        sel.innerHTML = Object.keys(db).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function renderSiswa() {
        const kls = document.getElementById('pilih-kelas').value;
        const body = document.getElementById('body-murid');
        const masterBody = document.getElementById('body-master-murid');
        body.innerHTML = ""; masterBody.innerHTML = "";
        let h = 0, k = 0, m = 0;
        if(!db[kls]) return;
        db[kls].forEach((siswa, i) => {
            if (siswa.poin > 10) m++; else if (siswa.poin >= 5) k++; else h++;
            let badgeCell = `<td style="display: ${currentUserRole === 'guru' ? 'table-cell' : 'none'}"><span class="badge ${siswa.poin > 10 ? 'bg-red' : (siswa.poin >= 5 ? 'bg-yellow' : 'bg-green')}">${siswa.poin}</span></td>`;
            let opts = currentUserRole === "sekretaris" ? `<option value="0">Hadir</option><option value="Sakit">Sakit</option><option value="Izin">Izin</option>` : `<option value="0">Aman</option><option value="2">Ringan (+2)</option><option value="5">Berat (+5)</option>`;
            body.innerHTML += `<tr><td>${siswa.nama}</td><td><select id="input-val-${i}">${opts}</select></td>${badgeCell}</tr>`;
            masterBody.innerHTML += `<tr><td>${siswa.nama}</td><td>${siswa.poin}</td><td><button class="btn-danger" onclick="deleteStudent(${i})">Hapus</button></td></tr>`;
        });
        if(currentUserRole === "guru") { document.getElementById('count-hijau').innerText = h; document.getElementById('count-kuning').innerText = k; document.getElementById('count-merah').innerText = m; }
    }

    function deleteStudent(index) { const kls = document.getElementById('pilih-kelas').value; if(confirm("Hapus?")) { db[kls].splice(index, 1); saveData(); } }
    
    function syncCloud() {
        const kls = document.getElementById('pilih-kelas').value;
        db[kls].forEach((siswa, i) => {
            const val = document.getElementById(`input-val-${i}`).value;
            if(currentUserRole === "guru" && !isNaN(val) && parseInt(val) > 0) { siswa.poin += parseInt(val); }
        });
        saveData(); alert("Data Disimpan!");
    }

    function addBulkStudents() {
        const kls = document.getElementById('pilih-kelas').value;
        const input = document.getElementById('bulk-students').value;
        input.split('\n').forEach(n => { const clean = n.trim().toUpperCase(); if(clean && !db[kls].find(m => m.nama === clean)) db[kls].push({ nama: clean, poin: 0 }); });
        document.getElementById('bulk-students').value = ""; saveData(); alert("Murid Ditambahkan!");
    }

    function saveData() { localStorage.setItem('stay_v12_db', JSON.stringify(db)); renderSiswa(); }
    
    function changeTab(t) {
        document.getElementById('tab-absen').style.display = t === 'absen' ? 'block' : 'none';
        document.getElementById('tab-admin').style.display = t === 'admin' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-'+t).classList.add('active');
    }
</script>
</body>
</html>
